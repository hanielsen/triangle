<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Trekant</title>
<meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="tk.png">
<link rel="apple-touch-icon" href="tk.png">

<style>
body 
{
    font-family: sans-serif;
}
h1 
{
    font-size:1.5em;
    margin-bottom: 4px;
}
#f1, #f2, #f3
{
    font-size:1em;
}
</style>
</head>

<body ontouchmove="BlockMove(event);">
<h1>TREKANT</h1>

<canvas id="canvas" width="60" height="40">
</canvas>
<p>
    x = <input id="f1" type="text" size="3" inputmode="decimal">
</p>

<p>
    y = <input id="f2" type="text" size="3" inputmode="decimal">
</p>

<p>
    z = <input id="f3" type="text" size="3" inputmode="decimal">
</p>

<p>
    <button onclick="vis()">Beregn</button>
</p>

<script>
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");
var vf1=document.getElementById("f1");
var vf2=document.getElementById("f2");
var vf3=document.getElementById("f3");

ctx.beginPath();
ctx.moveTo(10,30);
ctx.lineTo(30,30);
ctx.lineTo(30,10);
ctx.lineTo(10,30);
ctx.stroke();
ctx.font = "10px sans-serif";
ctx.textBaseline="middle";
ctx.textAlign="left";
ctx.fillText("x",20,36);
ctx.fillText("y",36,20);
ctx.fillText("z",15,15);


function BlockMove(event) 
{
    event.preventDefault();
}

function vis()
{
    var s1 = vf1.value;
    var s2 = vf2.value;
    var s3 = vf3.value;
    if (s1=="")
    {
        vf1.value  = Math.sqrt(s3*s3-s2*s2);
    }
    else if (s2=="")
    {
        vf2.value  = Math.sqrt(s3*s3-s1*s1);
    }
    else
    {
        vf3.value  = Math.sqrt(s1*s1+s2*s2);
    }
    
}

</script>
</body>
</html>
